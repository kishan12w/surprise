<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kishan ❤️ Babita</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: 'Dancing Script', cursive;
    background: linear-gradient(120deg, #ffe6f0, #fff0f5);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #a63e6e;
  }

  /* Heading animations */
  h1 {
    font-size: 4rem;
    margin: 0;
    text-shadow: 2px 2px 10px #d9a9c0;
    animation: pulse 2s infinite;
  }

  h2 {
    font-size: 2rem;
    margin-top: 0.5rem;
    color: #7a2b59;
    opacity: 0;
    animation: fadeIn 3s forwards 1s;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Surprise Button */
  button#surpriseBtn {
    margin-top: 2rem;
    background-color: #a63e6e;
    color: white;
    font-size: 1.8rem;
    border: none;
    padding: 1rem 2rem;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(166,62,110,0.6);
    transition: 0.3s;
  }

  button#surpriseBtn:hover {
    background-color: #7a2b59;
    transform: scale(1.05);
  }

  /* Photo styling */
  .photo {
    display: none;
    margin-top: 2rem;
    width: 300px;
    max-width: 90vw;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(166,62,110,0.5);
    animation: zoomIn 1s forwards;
  }

  @keyframes zoomIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Quotes */
  .quote {
    font-size: 1.8rem;
    margin-top: 2rem;
    opacity: 0;
    animation: fadeIn 2s forwards 1s;
    max-width: 90vw;
    text-align: center;
  }

  /* Floating Hearts */
  .heart {
    position: fixed;
    font-size: 24px;
    animation: floatUp 5s linear forwards;
    user-select: none;
    pointer-events: none;
    opacity: 0.85;
    text-shadow: 0 0 5px #7a2b59;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity:1; }
    100% { transform: translateY(-200px) scale(1.6); opacity:0; }
  }
</style>
</head>
<body>

<h1>Kishan ❤️ Babita</h1>
<h2>Forever Together</h2>

<button id="surpriseBtn">Click for your Surprise 💖</button>

<div class="quote" id="quote">"You are my sunshine, my only sunshine. 💕"</div>

<script>
const btn = document.getElementById('surpriseBtn');
const photo = document.getElementById('photo');
const quote = document.getElementById('quote');

btn.addEventListener('click', () => {
  btn.style.display = 'none';
  photo.style.display = 'block';
  quote.style.opacity = '1';
  startHearts();
});

function startHearts() {
  setInterval(() => {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.textContent = '❤️';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.fontSize = 16 + Math.random() * 24 + 'px';
    document.body.appendChild(heart);
    heart.addEventListener('animationend', () => heart.remove());
  }, 300);
}
</script>
